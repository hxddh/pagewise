name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger: releases the current VERSION, creating the tag server-side
  # (used when a tag cannot be pushed directly). Runs against the ref it is
  # dispatched on — dispatch from the commit whose VERSION you intend to ship.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tesseract (OCR)
        run: brew install tesseract tesseract-lang

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: rel
        run: |
          file_version="$(cat VERSION)"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: the pushed tag must match the VERSION file.
            tag="${GITHUB_REF_NAME}"
            tag_version="${tag#v}"
            if [ "$tag_version" != "$file_version" ]; then
              echo "::error::Tag $tag (version $tag_version) does not match VERSION file ($file_version)"
              exit 1
            fi
          else
            # Manual dispatch: derive the tag from VERSION; it is created by the
            # release step below from the checked-out commit.
            tag="v${file_version}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag (VERSION=$file_version)"

      - name: Secret scan
        run: npm run check:secrets

      - name: Tests
        run: npm test

      - name: Sync version manifests
        run: npm run version:sync

      - name: Build macOS bundle
        run: npm run tauri build

      - name: Verify bundle Info.plist version
        run: npm run verify:bundle-version

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg release-artifacts/
          # Ship a tarball of the .app so symlinks/permissions survive (a raw
          # .app directory cannot be a release asset).
          if ls src-tauri/target/release/bundle/macos/*.app >/dev/null 2>&1; then
            tar -czf release-artifacts/PageWise.app.tar.gz \
              -C src-tauri/target/release/bundle/macos \
              "$(basename src-tauri/target/release/bundle/macos/*.app)"
          fi
          ls -la release-artifacts/

      - name: Ensure a DMG was produced
        run: |
          if [ -z "$(ls release-artifacts/*.dmg 2>/dev/null)" ]; then
            echo "::error::No .dmg artifact found — aborting release"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pagewise-macos
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
